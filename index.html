<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Error Occurred</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Roboto, Arial, 'sans-serif';
      width: 100%;
      height: 100%;
      background-color: #0f1223;
      color: #fff;
    }

    .main {
      padding: 15px;
      width: 100%;
      height: 100%;
      min-height: 100%;
      background-color: #0f1223;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .main::after {
      content: '';
      display: block;
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      background: url("./images/bg-pattern.png");
      background-size: 35%;
      z-index: 0;
      opacity: .065;
      filter: grayscale();
    }

    .error {
      width: 100%;
      max-width: 400px;
      flex-basis: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      background-color: #0d1535;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 0 4px rgba(42, 59, 138, 0.45);
    }

    .error__message {
      font-size: 16px;
      line-height: 1.42;
    }

    .error__icon {
      width: 150px;
      height: 150px;
      fill: #d84141;
    }

    @media (max-width: 560px) {
      .error__icon {
        width: 100px;
        height: 100px;
      }

      .main::after {
        background-size: 100%;
      }
    }
  </style>

  <script type="text/javascript">
    const urlParams = new URLSearchParams(window.location.search);
    const message = urlParams.get('message');

    console.error(`Hubtech error: ${message || 'Unknown error occurred'}`);
  </script>
</head>
<body>
  <main class="main">
    <div class="error">

      <svg class="error__icon" fill="#000000" width="800px" height="800px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.884 2.532c-.346-.654-1.422-.654-1.768 0l-9 17A.999.999 0 0 0 3 21h18a.998.998 0 0 0 .883-1.467L12.884 2.532zM13 18h-2v-2h2v2zm-2-4V9h2l.001 5H11z"/></svg>
      <p class="error__message">
        An unexpected error has occurred. Please try again later. If the issue persists, please contact support for further assistance.
      </p>
    </div>
  </main>
</body>
</html>
