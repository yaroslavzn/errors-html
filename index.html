<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Error Occurred</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Roboto, Arial, 'sans-serif';
      width: 100%;
      height: 100%;
      background-color: #0f1223;
      color: #fff;
    }

    .main {
      padding: 30px 15px;
      width: 100%;
      min-height: 100%;
      background-color: #0f1223;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .main::after {
      content: '';
      display: block;
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      background: url("./images/bg-pattern.png");
      background-size: 35%;
      z-index: 0;
      opacity: .065;
      filter: grayscale();
    }

    .error {
      width: 100%;
      max-width: 400px;
      flex-basis: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
      background-color: #0d1535;
      border-radius: 12px;
      padding: 30px 15px;
      box-shadow: 0 0 0 4px rgba(42, 59, 138, 0.45);
    }

    .error__message {
      font-size: 16px;
      line-height: 1.42;
      margin: 0;
    }

    .error__icon {
      width: 106px;
      height: 106px;
      fill: #d84141;
    }

    .error-description-portal h3 {
      margin-bottom: 25px;
    }

    .error-description-portal ul {
      list-style: none;
      padding: 0;
      margin: 0;
      margin-bottom: 25px;
    }

    .error-description-portal li {
      word-break: break-all;
    }

    .error-description-portal li span {
      display: inline-block;
      max-width: 100%;
    }

    .error-description-portal li:first-child span {
      text-transform: uppercase;
    }

    .error-description-portal li:not(:last-of-type) {
      margin-bottom: 8px;
    }

    @media (max-width: 560px) {
      .error__icon {
        width: 100px;
        height: 100px;
      }

      .main::after {
        background-size: 100%;
      }
    }
  </style>

  <script type="text/javascript">
    const prepareHtmlTemplate = ({ reason, rows }) => {
      const headingElement = document.createElement('h3');
      headingElement.textContent = reason;

      const listElement = document.createElement('ul');

      rows.forEach(({ title, data }) => {
        const listItem = document.createElement('li');
        const heading = document.createElement('strong');
        const value = document.createElement('span');
        heading.textContent = `${title}: `;
        value.textContent = data;
        listItem.insertAdjacentElement('beforeend', heading);
        listItem.insertAdjacentElement('beforeend', value);

        listElement.insertAdjacentElement('beforeend', listItem);
      })

      return {
        heading: headingElement,
        list: listElement,
      }
    };

    const renderHtmlTemplate = ({ heading, list }) => {
      const parent = document.querySelector('.error-description-portal');

      parent.insertAdjacentElement('afterbegin', list);
      parent.insertAdjacentElement('afterbegin', heading);
    };

    const generateRowsData = (gameId, provider, token) => {
      return [
        { title: 'Provider', data: provider },
        { title: 'Game ID', data: gameId },
        { title: 'Error ID', data: token }
      ];
    }

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const reason = urlParams.get('reason') || 'Unexpected error';
      const gameId = urlParams.get('gameId') || 'Unknown';
      const provider = urlParams.get('provider') || 'Unknown';
      const token = urlParams.get('token') || 'Unknown';
      const rows = generateRowsData(gameId, provider, token);

      renderHtmlTemplate(prepareHtmlTemplate({ reason, rows }));
    });
  </script>
</head>
<body>
  <main class="main">
    <div class="error">
      <svg class="error__icon" width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

        <!-- Background -->
        <circle cx="128" cy="128" r="110" fill="#2a1f3d"/>

        <!-- Casino Chip -->
        <circle cx="128" cy="128" r="95" fill="#c62828"/>
        <circle cx="128" cy="128" r="65" fill="#ffffff"/>

        <!-- Chip Decorative Marks -->
        <g fill="#c62828">
          <rect x="123" y="33" width="10" height="20" rx="2"/>
          <rect x="123" y="203" width="10" height="20" rx="2"/>
          <rect x="33" y="123" width="20" height="10" rx="2"/>
          <rect x="203" y="123" width="20" height="10" rx="2"/>
        </g>

        <!-- Center Error Symbol -->
        <circle cx="128" cy="128" r="30" fill="#c62828"/>
        <rect x="124" y="108" width="8" height="30" rx="3" fill="#ffffff"/>
        <circle cx="128" cy="148" r="4" fill="#ffffff"/>

        <!-- Dice Around Icon -->

        <!-- Top Left -->
        <g transform="rotate(-15 55 55)">
          <rect x="35" y="35" width="40" height="40" rx="8" fill="#ffffff" stroke="#cccccc" stroke-width="3"/>
          <circle cx="55" cy="55" r="5" fill="#2a1f3d"/>
        </g>

        <!-- Top Right (FIXED ALIGNMENT) -->
        <g transform="rotate(20 200 55)">
          <rect x="180" y="35" width="40" height="40" rx="8" fill="#ffffff" stroke="#cccccc" stroke-width="3"/>
          <!-- properly centered diagonal (2) -->
          <circle cx="192" cy="47" r="4" fill="#2a1f3d"/>
          <circle cx="208" cy="63" r="4" fill="#2a1f3d"/>
        </g>

        <!-- Bottom Left -->
        <g transform="rotate(15 55 200)">
          <rect x="35" y="180" width="40" height="40" rx="8" fill="#ffffff" stroke="#cccccc" stroke-width="3"/>
          <circle cx="45" cy="190" r="4" fill="#2a1f3d"/>
          <circle cx="65" cy="210" r="4" fill="#2a1f3d"/>
        </g>

        <!-- Bottom Right -->
        <g transform="rotate(-20 200 200)">
          <rect x="180" y="180" width="40" height="40" rx="8" fill="#ffffff" stroke="#cccccc" stroke-width="3"/>
          <circle cx="200" cy="200" r="5" fill="#2a1f3d"/>
        </g>

      </svg>

      <div class="error-description">
        <div class="error-description-portal"></div>

        <p class="error__message">
          Please, try and login again, and contact support with this screenshot if continues
        </p>
      </div>
    </div>
  </main>
</body>
</html>
